# NATS Leaf Node Configuration
# Leaf nodes connect to a NATS cluster/supercluster as remote clusters
# They have their own accounts and can subscribe/publish through the parent cluster
 
accounts: {
  $SYS: {
    users: [
      { user: admin, password: password }
    ]
  },
  EDGE_1: {
    jetstream: enabled,
    users: [
      { user: edge1, password: password }
    ]
  }
}
 
jetstream {}

# System account designation (REQUIRED when using both leaf and gateway)
system_account: "$SYS"
 
# Leaf node configuration
# Points to one or more servers in your supercluster
leafNodes: {
  remotes: [
    {
      url: "nats://edge1:password@na_1:7422"
    }
  ]
}
 
# Optional: Local cluster configuration if you want multiple leaf nodes
# cluster: {
#   name: LEAF_CLUSTER,
#   port: 6222,
#   routes: [
#     "nats://leaf_1:6222"
#   ]
# }